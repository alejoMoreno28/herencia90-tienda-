name: Sync SEO Catalog

on:
  workflow_dispatch:
  schedule:
    - cron: '17 */6 * * *'

permissions:
  contents: write

concurrency:
  group: seo-catalog-sync
  cancel-in-progress: false

jobs:
  sync-seo:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Regenerate SEO catalog from Supabase
        run: node scripts/generate-product-pages.mjs

      - name: Validate generated SEO files
        run: node tests/site-seo.test.mjs

      - name: Commit synchronized SEO files
        run: |
          if git diff --quiet -- web/productos.json web/camisetas web/sitemap.xml web/robots.txt; then
            echo "No SEO updates detected."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add web/productos.json web/camisetas web/sitemap.xml web/robots.txt
          git commit -m "chore: sync seo catalog from supabase"
          git push
